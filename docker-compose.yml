services:
  mysql:
    image: mysql:8.0
    container_name: parkhub-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root123}
      MYSQL_USER: ${DB_USER:-parkhub}
      MYSQL_PASSWORD: ${DB_PASSWORD:-parkhub123}
      MYSQL_DATABASE: ${DB_NAME:-parkhub_dev}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root123}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - parkhub-network

  redis:
    image: redis:7-alpine
    container_name: parkhub-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - parkhub-network

  emqx:
    image: emqx/emqx:5.4.0
    container_name: parkhub-emqx
    environment:
      EMQX_NAME: parkhub
      EMQX_HOST: 0.0.0.0
      EMQX_NODE__COOKIE: parkhub_secret_cookie
      EMQX_DASHBOARD__DEFAULT_USERNAME: admin
      EMQX_DASHBOARD__DEFAULT_PASSWORD: public
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_WS_PORT:-8083}:8083"
      - "${MQTT_MANAGEMENT_PORT:-18083}:18083"
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
    healthcheck:
      test: ["CMD", "emqx", "ctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - parkhub-network

  emqx-init:
    image: curlimages/curl:latest
    container_name: parkhub-emqx-init
    depends_on:
      emqx:
        condition: service_healthy
    environment:
      EMQX_HOST: emqx
      EMQX_API_PORT: 18083
      DASHBOARD_USER: admin
      DASHBOARD_PASS: public
      BACKEND_USER: ${MQTT_BACKEND_USERNAME:-backend_service}
      BACKEND_PASS: ${MQTT_BACKEND_PASSWORD:-backend_secret}
    volumes:
      - ./docker/emqx/init-backend-user.sh:/init.sh:ro
    entrypoint: ["/bin/sh", "/init.sh"]
    networks:
      - parkhub-network

  api:
    build:
      context: ./parkhub-api
      dockerfile: Dockerfile.dev
    container_name: parkhub-api
    environment:
      APP_PORT: ${APP_PORT:-8080}
      APP_ENV: ${APP_ENV:-development}
      DB_HOST: mysql
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-parkhub}
      DB_PASSWORD: ${DB_PASSWORD:-parkhub123}
      DB_NAME: ${DB_NAME:-parkhub_dev}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production-min-32-chars}
      JWT_ISSUER: ${JWT_ISSUER:-parkhub}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      REDIS_URL: redis://redis:6379
      MQTT_BROKER_URL: tcp://emqx:1883
      MQTT_BACKEND_USERNAME: ${MQTT_BACKEND_USERNAME:-backend_service}
      MQTT_BACKEND_PASSWORD: ${MQTT_BACKEND_PASSWORD:-backend_secret}
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - ./parkhub-api:/app:cached
      - go_mod_cache:/go/pkg/mod
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      emqx:
        condition: service_healthy
    networks:
      - parkhub-network

  web:
    build:
      context: ./parkhub-web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    container_name: parkhub-web
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - parkhub-network

volumes:
  mysql_data:
  redis_data:
  emqx_data:
  emqx_log:
  go_mod_cache:

networks:
  parkhub-network:
    driver: bridge
