name: Refactor CI

on:
  push:
    branches:
      - 'refactor/**'
  pull_request:
    branches:
      - 'refactor/**'

defaults:
  run:
    working-directory: parkhub-api

jobs:
  proto-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
        with:
          version: 'latest'
      - name: buf lint
        run: buf lint

  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: parkhub-api/go.mod
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...

  build-monolith:
    runs-on: ubuntu-latest
    needs: [proto-lint, go-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: parkhub-api/go.mod
      - name: build
        run: go build -o bin/monolith ./cmd/server
