Tenant:
  type: object
  properties:
    id:
      type: string
      format: uuid
      description: 租户ID
    company_name:
      type: string
      description: 公司名称
    contact_name:
      type: string
      description: 联系人姓名
    contact_phone:
      type: string
      description: 联系人电话
    status:
      type: string
      enum: [active, frozen]
      description: 租户状态
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

TenantListResponse:
  type: object
  properties:
    data:
      type: array
      items:
        $ref: '#/Tenant'
    total:
      type: integer
      description: 总数
    page:
      type: integer
      description: 当前页
    page_size:
      type: integer
      description: 每页数量

CreateTenantRequest:
  type: object
  required:
    - company_name
    - contact_name
    - contact_phone
  properties:
    company_name:
      type: string
      description: 公司名称
      maxLength: 100
    contact_name:
      type: string
      description: 联系人姓名
      maxLength: 50
    contact_phone:
      type: string
      pattern: '^1[3-9]\d{9}$'
      description: 联系人电话

UpdateTenantRequest:
  type: object
  properties:
    company_name:
      type: string
      description: 公司名称
      maxLength: 100
    contact_name:
      type: string
      description: 联系人姓名
      maxLength: 50
    contact_phone:
      type: string
      pattern: '^1[3-9]\d{9}$'
      description: 联系人电话
