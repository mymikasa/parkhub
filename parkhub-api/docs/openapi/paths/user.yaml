/users:
  get:
    tags:
      - User
    summary: 获取用户列表
    description: 获取当前租户下的用户列表
    operationId: listUsers
    security:
      - BearerAuth: []
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: page_size
        in: query
        schema:
          type: integer
          default: 20
      - name: role
        in: query
        schema:
          type: string
          enum: [platform_admin, tenant_admin, operator]
      - name: status
        in: query
        schema:
          type: string
          enum: [active, frozen]
    responses:
      '200':
        description: 成功获取用户列表
        content:
          application/json:
            schema:
              $ref: '../schemas/user.yaml#/UserListResponse'
      '401':
        $ref: '#/components/responses/Unauthorized'
  post:
    tags:
      - User
    summary: 创建用户
    description: 在当前租户下创建新用户
    operationId: createUser
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/user.yaml#/CreateUserRequest'
    responses:
      '201':
        description: 创建成功
        content:
          application/json:
            schema:
              $ref: '../schemas/user.yaml#/User'
      '400':
        $ref: '#/components/responses/BadRequest'
      '401':
        $ref: '#/components/responses/Unauthorized'
      '403':
        $ref: '#/components/responses/Forbidden'

/users/{id}:
  get:
    tags:
      - User
    summary: 获取用户详情
    operationId: getUser
    security:
      - BearerAuth: []
    parameters:
      - $ref: '#/components/parameters/UserId'
    responses:
      '200':
        description: 成功获取用户信息
        content:
          application/json:
            schema:
              $ref: '../schemas/user.yaml#/User'
      '404':
        $ref: '#/components/responses/NotFound'
  put:
    tags:
      - User
    summary: 更新用户信息
    operationId: updateUser
    security:
      - BearerAuth: []
    parameters:
      - $ref: '#/components/parameters/UserId'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/user.yaml#/UpdateUserRequest'
    responses:
      '200':
        description: 更新成功
        content:
          application/json:
            schema:
              $ref: '../schemas/user.yaml#/User'
      '400':
        $ref: '#/components/responses/BadRequest'
      '404':
        $ref: '#/components/responses/NotFound'
  delete:
    tags:
      - User
    summary: 删除用户
    operationId: deleteUser
    security:
      - BearerAuth: []
    parameters:
      - $ref: '#/components/parameters/UserId'
    responses:
      '200':
        description: 删除成功
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/MessageResponse'
      '404':
        $ref: '#/components/responses/NotFound'

/users/{id}/freeze:
  post:
    tags:
      - User
    summary: 冻结用户
    operationId: freezeUser
    security:
      - BearerAuth: []
    parameters:
      - $ref: '#/components/parameters/UserId'
    responses:
      '200':
        description: 冻结成功
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/MessageResponse'
      '404':
        $ref: '#/components/responses/NotFound'

/users/{id}/activate:
  post:
    tags:
      - User
    summary: 激活用户
    operationId: activateUser
    security:
      - BearerAuth: []
    parameters:
      - $ref: '#/components/parameters/UserId'
    responses:
      '200':
        description: 激活成功
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/MessageResponse'
      '404':
        $ref: '#/components/responses/NotFound'

/users/{id}/reset-password:
  post:
    tags:
      - User
    summary: 重置用户密码
    operationId: resetUserPassword
    security:
      - BearerAuth: []
    parameters:
      - $ref: '#/components/parameters/UserId'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - new_password
            properties:
              new_password:
                type: string
                format: password
                minLength: 6
    responses:
      '200':
        description: 重置成功
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/MessageResponse'
      '400':
        $ref: '#/components/responses/BadRequest'
      '404':
        $ref: '#/components/responses/NotFound'
