/auth/login:
  post:
    tags:
      - Auth
    summary: 账号密码登录
    description: 使用用户名/邮箱和密码进行登录认证
    operationId: login
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/auth.yaml#/LoginRequest'
          examples:
            username:
              summary: 用户名登录
              value:
                account: admin
                password: Password123
            email:
              summary: 邮箱登录
              value:
                account: admin@parkhub.cn
                password: Password123
    responses:
      '200':
        description: 登录成功
        content:
          application/json:
            schema:
              $ref: '../schemas/auth.yaml#/LoginResponse'
      '400':
        description: 请求参数错误
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
            example:
              code: INVALID_REQUEST
              message: 请输入账号
      '401':
        description: 认证失败
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
            example:
              code: INVALID_CREDENTIALS
              message: 账号或密码错误
      '403':
        description: 账号被冻结
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
            example:
              code: ACCOUNT_FROZEN
              message: 账号已被冻结，请联系管理员

/auth/sms/send:
  post:
    tags:
      - Auth
    summary: 发送短信验证码
    description: 发送短信验证码（MVP阶段验证码固定为123456）
    operationId: sendSmsCode
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/auth.yaml#/SendSmsCodeRequest'
          example:
            phone: "13800138000"
            purpose: login
    responses:
      '200':
        description: 验证码发送成功
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/MessageResponse'
            example:
              message: 验证码已发送
      '400':
        description: 请求参数错误
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
            example:
              code: PHONE_NOT_REGISTERED
              message: 该手机号未注册
      '429':
        description: 发送频率过高
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
            example:
              code: SMS_TOO_FREQUENT
              message: 验证码发送过于频繁，请稍后再试

/auth/sms/login:
  post:
    tags:
      - Auth
    summary: 验证码登录
    description: 使用手机号和验证码进行登录
    operationId: smsLogin
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/auth.yaml#/SmsLoginRequest'
          example:
            phone: "13800138000"
            code: "123456"
    responses:
      '200':
        description: 登录成功
        content:
          application/json:
            schema:
              $ref: '../schemas/auth.yaml#/LoginResponse'
      '400':
        description: 验证码错误
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
            example:
              code: INVALID_SMS_CODE
              message: 验证码错误或已过期

/auth/refresh:
  post:
    tags:
      - Auth
    summary: 刷新令牌
    description: 使用 Refresh Token 获取新的 Access Token
    operationId: refreshToken
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/auth.yaml#/RefreshTokenRequest'
    responses:
      '200':
        description: 刷新成功
        content:
          application/json:
            schema:
              $ref: '../schemas/auth.yaml#/LoginResponse'
      '401':
        description: Refresh Token 无效或过期
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
            example:
              code: TOKEN_EXPIRED
              message: 登录已过期，请重新登录

/auth/logout:
  post:
    tags:
      - Auth
    summary: 登出
    description: 登出当前用户，吊销 Refresh Token
    operationId: logout
    security:
      - BearerAuth: []
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              refresh_token:
                type: string
                description: 可选，用于吊销指定的 Refresh Token
    responses:
      '200':
        description: 登出成功
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/MessageResponse'
            example:
              message: 登出成功
      '401':
        description: 未授权
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'

/auth/me:
  get:
    tags:
      - Auth
    summary: 获取当前用户信息
    description: 获取当前登录用户的详细信息
    operationId: getCurrentUser
    security:
      - BearerAuth: []
    responses:
      '200':
        description: 成功获取用户信息
        content:
          application/json:
            schema:
              $ref: '../schemas/auth.yaml#/CurrentUserResponse'
      '401':
        description: 未授权
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
