openapi: 3.0.3
info:
  title: ParkHub API
  description: |
    ParkHub 智能停车管理系统 API 文档
    
    ## 认证方式
    使用 JWT Bearer Token 认证，在请求头中添加：
    ```
    Authorization: Bearer <access_token>
    ```
    
    ## 角色说明
    - `platform_admin`: 平台管理员，可管理所有租户
    - `tenant_admin`: 租户管理员，可管理本租户资源
    - `operator`: 操作员，可进行日常操作
    
    ## 错误响应
    所有错误响应遵循统一格式：
    ```json
    {
      "code": "ERROR_CODE",
      "message": "错误描述"
    }
    ```
  version: 1.0.0
  contact:
    name: ParkHub Team
    email: support@parkhub.cn

servers:
  - url: http://localhost:8080/api/v1
    description: Development server
  - url: https://api.parkhub.cn/api/v1
    description: Production server

tags:
  - name: Auth
    description: 认证相关接口
  - name: Tenant
    description: 租户管理接口（平台管理员）
  - name: User
    description: 用户管理接口

paths:
  # ==================== 认证模块 ====================
  /auth/login:
    post:
      tags:
        - Auth
      summary: 账号密码登录
      description: 使用用户名/邮箱和密码进行登录认证
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              username:
                summary: 用户名登录
                value:
                  account: admin
                  password: Password123
              email:
                summary: 邮箱登录
                value:
                  account: admin@parkhub.cn
                  password: Password123
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: INVALID_REQUEST
                message: 请输入账号
        '401':
          description: 认证失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: INVALID_CREDENTIALS
                message: 账号或密码错误
        '403':
          description: 账号被冻结
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: ACCOUNT_FROZEN
                message: 账号已被冻结，请联系管理员

  /auth/sms/send:
    post:
      tags:
        - Auth
      summary: 发送短信验证码
      description: 发送短信验证码（MVP阶段验证码固定为123456）
      operationId: sendSmsCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendSmsCodeRequest'
            example:
              phone: "13800138000"
              purpose: login
      responses:
        '200':
          description: 验证码发送成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: 验证码已发送
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: PHONE_NOT_REGISTERED
                message: 该手机号未注册
        '429':
          description: 发送频率过高
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: SMS_TOO_FREQUENT
                message: 验证码发送过于频繁，请稍后再试

  /auth/sms/login:
    post:
      tags:
        - Auth
      summary: 验证码登录
      description: 使用手机号和验证码进行登录
      operationId: smsLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SmsLoginRequest'
            example:
              phone: "13800138000"
              code: "123456"
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: 验证码错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: INVALID_SMS_CODE
                message: 验证码错误或已过期

  /auth/refresh:
    post:
      tags:
        - Auth
      summary: 刷新令牌
      description: 使用 Refresh Token 获取新的 Access Token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: 刷新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Refresh Token 无效或过期
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: TOKEN_EXPIRED
                message: 登录已过期，请重新登录

  /auth/logout:
    post:
      tags:
        - Auth
      summary: 登出
      description: 登出当前用户，吊销 Refresh Token
      operationId: logout
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
                  description: 可选，用于吊销指定的 Refresh Token
      responses:
        '200':
          description: 登出成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: 登出成功
        '401':
          description: 未授权
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/me:
    get:
      tags:
        - Auth
      summary: 获取当前用户信息
      description: 获取当前登录用户的详细信息
      operationId: getCurrentUser
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功获取用户信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponse'
        '401':
          description: 未授权
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== 租户管理模块（计划中）====================
  /tenants:
    get:
      tags:
        - Tenant
      summary: 获取租户列表
      description: 获取所有租户列表（仅平台管理员可用）
      operationId: listTenants
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
            enum: [active, frozen]
      responses:
        '200':
          description: 成功获取租户列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags:
        - Tenant
      summary: 创建租户
      description: 创建新租户（仅平台管理员可用）
      operationId: createTenant
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTenantRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /tenants/{id}:
    get:
      tags:
        - Tenant
      summary: 获取租户详情
      operationId: getTenant
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: 成功获取租户信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Tenant
      summary: 更新租户信息
      operationId: updateTenant
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTenantRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /tenants/{id}/freeze:
    post:
      tags:
        - Tenant
      summary: 冻结租户
      description: 冻结指定租户，暂停其所有服务
      operationId: freezeTenant
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: 冻结成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /tenants/{id}/unfreeze:
    post:
      tags:
        - Tenant
      summary: 解冻租户
      operationId: unfreezeTenant
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: 解冻成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==================== 用户管理模块（计划中）====================
  /users:
    get:
      tags:
        - User
      summary: 获取用户列表
      description: 获取当前租户下的用户列表
      operationId: listUsers
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
        - name: role
          in: query
          schema:
            type: string
            enum: [platform_admin, tenant_admin, operator]
        - name: status
          in: query
          schema:
            type: string
            enum: [active, frozen]
      responses:
        '200':
          description: 成功获取用户列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags:
        - User
      summary: 创建用户
      description: 在当前租户下创建新用户
      operationId: createUser
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /users/{id}:
    get:
      tags:
        - User
      summary: 获取用户详情
      operationId: getUser
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: 成功获取用户信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - User
      summary: 更新用户信息
      operationId: updateUser
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - User
      summary: 删除用户
      operationId: deleteUser
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{id}/freeze:
    post:
      tags:
        - User
      summary: 冻结用户
      operationId: freezeUser
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: 冻结成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{id}/activate:
    post:
      tags:
        - User
      summary: 激活用户
      operationId: activateUser
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: 激活成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{id}/reset-password:
    post:
      tags:
        - User
      summary: 重置用户密码
      operationId: resetUserPassword
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - new_password
              properties:
                new_password:
                  type: string
                  format: password
                  minLength: 6
      responses:
        '200':
          description: 重置成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Token 认证

  parameters:
    TenantId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: 租户ID
    UserId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: 用户ID

  responses:
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: INVALID_REQUEST
            message: 请求参数错误
    Unauthorized:
      description: 未授权
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: UNAUTHORIZED
            message: 未授权访问
    Forbidden:
      description: 权限不足
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: PERMISSION_DENIED
            message: 权限不足
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: NOT_FOUND
            message: 资源不存在

  schemas:
    # ========== 认证相关 ==========
    LoginRequest:
      type: object
      required:
        - account
        - password
      properties:
        account:
          type: string
          description: 用户名或邮箱
          example: admin
        password:
          type: string
          format: password
          description: 密码
          example: Password123
        remember:
          type: boolean
          description: 记住登录状态，延长 Token 有效期
          default: false

    SendSmsCodeRequest:
      type: object
      required:
        - phone
        - purpose
      properties:
        phone:
          type: string
          pattern: '^1[3-9]\d{9}$'
          description: 手机号
          example: "13800138000"
        purpose:
          type: string
          enum: [login, reset_password]
          description: 验证码用途
          example: login

    SmsLoginRequest:
      type: object
      required:
        - phone
        - code
      properties:
        phone:
          type: string
          pattern: '^1[3-9]\d{9}$'
          description: 手机号
          example: "13800138000"
        code:
          type: string
          pattern: '^\d{6}$'
          description: 验证码
          example: "123456"

    RefreshTokenRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
          description: Refresh Token

    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
          description: 访问令牌（2小时有效）
        refresh_token:
          type: string
          description: 刷新令牌（7天有效）
        expires_in:
          type: integer
          description: 过期时间（秒）
          example: 7200
        user:
          $ref: '#/components/schemas/UserInfo'

    UserInfo:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: 用户ID
        username:
          type: string
          description: 用户名
        email:
          type: string
          format: email
          description: 邮箱
        phone:
          type: string
          description: 手机号
        real_name:
          type: string
          description: 真实姓名
        role:
          type: string
          enum: [platform_admin, tenant_admin, operator]
          description: 角色
        tenant_id:
          type: string
          format: uuid
          description: 租户ID（平台管理员为空）

    CurrentUserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        real_name:
          type: string
        role:
          type: string
          enum: [platform_admin, tenant_admin, operator]
        tenant_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [active, frozen]
        created_at:
          type: string
          format: date-time

    # ========== 租户相关 ==========
    Tenant:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: 租户ID
        company_name:
          type: string
          description: 公司名称
        contact_name:
          type: string
          description: 联系人姓名
        contact_phone:
          type: string
          description: 联系人电话
        status:
          type: string
          enum: [active, frozen]
          description: 租户状态
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TenantListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Tenant'
        total:
          type: integer
          description: 总数
        page:
          type: integer
          description: 当前页
        page_size:
          type: integer
          description: 每页数量

    CreateTenantRequest:
      type: object
      required:
        - company_name
        - contact_name
        - contact_phone
      properties:
        company_name:
          type: string
          description: 公司名称
          maxLength: 100
        contact_name:
          type: string
          description: 联系人姓名
          maxLength: 50
        contact_phone:
          type: string
          pattern: '^1[3-9]\d{9}$'
          description: 联系人电话

    UpdateTenantRequest:
      type: object
      properties:
        company_name:
          type: string
          description: 公司名称
          maxLength: 100
        contact_name:
          type: string
          description: 联系人姓名
          maxLength: 50
        contact_phone:
          type: string
          pattern: '^1[3-9]\d{9}$'
          description: 联系人电话

    # ========== 用户相关 ==========
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: 用户ID
        tenant_id:
          type: string
          format: uuid
          description: 租户ID
        username:
          type: string
          description: 用户名
        email:
          type: string
          format: email
          description: 邮箱
        phone:
          type: string
          description: 手机号
        real_name:
          type: string
          description: 真实姓名
        role:
          type: string
          enum: [platform_admin, tenant_admin, operator]
          description: 角色
        status:
          type: string
          enum: [active, frozen]
          description: 用户状态
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
        total:
          type: integer
          description: 总数
        page:
          type: integer
          description: 当前页
        page_size:
          type: integer
          description: 每页数量

    CreateUserRequest:
      type: object
      required:
        - username
        - password
        - real_name
        - role
      properties:
        username:
          type: string
          description: 用户名
          minLength: 3
          maxLength: 50
        password:
          type: string
          format: password
          description: 密码
          minLength: 6
        email:
          type: string
          format: email
          description: 邮箱
        phone:
          type: string
          pattern: '^1[3-9]\d{9}$'
          description: 手机号
        real_name:
          type: string
          description: 真实姓名
          maxLength: 50
        role:
          type: string
          enum: [platform_admin, tenant_admin, operator]
          description: 角色

    UpdateUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: 邮箱
        phone:
          type: string
          pattern: '^1[3-9]\d{9}$'
          description: 手机号
        real_name:
          type: string
          description: 真实姓名
          maxLength: 50
        role:
          type: string
          enum: [platform_admin, tenant_admin, operator]
          description: 角色

    # ========== 通用响应 ==========
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          description: 错误码
        message:
          type: string
          description: 错误消息

    MessageResponse:
      type: object
      properties:
        message:
          type: string
          description: 消息内容

x-error-codes:
  - code: INVALID_REQUEST
    status: 400
    description: 请求参数错误
  - code: INVALID_CREDENTIALS
    status: 401
    description: 账号或密码错误
  - code: ACCOUNT_FROZEN
    status: 403
    description: 账号已被冻结
  - code: TENANT_FROZEN
    status: 403
    description: 租户已暂停服务
  - code: INVALID_SMS_CODE
    status: 400
    description: 验证码错误或已过期
  - code: SMS_TOO_FREQUENT
    status: 429
    description: 验证码发送过于频繁
  - code: PHONE_NOT_REGISTERED
    status: 400
    description: 该手机号未注册
  - code: TOKEN_EXPIRED
    status: 401
    description: Token已过期
  - code: TOKEN_INVALID
    status: 401
    description: 无效的Token
  - code: PERMISSION_DENIED
    status: 403
    description: 权限不足
  - code: UNAUTHORIZED
    status: 401
    description: 未授权访问
  - code: NOT_FOUND
    status: 404
    description: 资源不存在
  - code: USERNAME_EXISTS
    status: 400
    description: 用户名已存在
  - code: PHONE_EXISTS
    status: 400
