openapi: 3.0.3
info:
  title: ParkHub API
  description: |
    ParkHub 智能停车管理系统 API 文档
    
    ## 认证方式
    使用 JWT Bearer Token 认证，在请求头中添加：
    ```
    Authorization: Bearer <access_token>
    ```
    
    ## 角色说明
    - `platform_admin`: 平台管理员，可管理所有租户
    - `tenant_admin`: 租户管理员，可管理本租户资源
    - `operator`: 操作员，可进行日常操作
    
    ## 错误响应
    所有错误响应遵循统一格式：
    ```json
    {
      "code": "ERROR_CODE",
      "message": "错误描述"
    }
    ```
  version: 1.0.0
  contact:
    name: ParkHub Team
    email: support@parkhub.cn

servers:
  - url: http://localhost:8080/api/v1
    description: Development server
  - url: https://api.parkhub.cn/api/v1
    description: Production server

tags:
  - name: Auth
    description: 认证相关接口
  - name: Tenant
    description: 租户管理接口（平台管理员）
  - name: User
    description: 用户管理接口
  - name: ParkingLot
    description: 停车场管理接口
  - name: BillingRule
    description: 计费规则管理接口

paths:
  /auth/login:
    $ref: 'openapi/paths/auth.yaml#/~1auth~1login'
  /auth/sms/send:
    $ref: 'openapi/paths/auth.yaml#/~1auth~1sms~1send'
  /auth/sms/login:
    $ref: 'openapi/paths/auth.yaml#/~1auth~1sms~1login'
  /auth/refresh:
    $ref: 'openapi/paths/auth.yaml#/~1auth~1refresh'
  /auth/logout:
    $ref: 'openapi/paths/auth.yaml#/~1auth~1logout'
  /auth/me:
    $ref: 'openapi/paths/auth.yaml#/~1auth~1me'

  /tenants:
    $ref: 'openapi/paths/tenant.yaml#/~1tenants'
  /tenants/{id}:
    $ref: 'openapi/paths/tenant.yaml#/~1tenants~1{id}'
  /tenants/{id}/freeze:
    $ref: 'openapi/paths/tenant.yaml#/~1tenants~1{id}~1freeze'
  /tenants/{id}/unfreeze:
    $ref: 'openapi/paths/tenant.yaml#/~1tenants~1{id}~1unfreeze'
  /users:
    $ref: 'openapi/paths/user.yaml#/~1users'
  /users/{id}:
    $ref: 'openapi/paths/user.yaml#/~1users~1{id}'
  /users/{id}/freeze:
    $ref: 'openapi/paths/user.yaml#/~1users~1{id}~1freeze'
  /users/{id}/activate:
    $ref: 'openapi/paths/user.yaml#/~1users~1{id}~1activate'
  /users/{id}/reset-password:
    $ref: 'openapi/paths/user.yaml#/~1users~1{id}~1reset-password'
  /parking-lots:
    $ref: 'openapi/paths/parking-lot.yaml#/~1parking-lots'
  /parking-lots/stats:
    $ref: 'openapi/paths/parking-lot.yaml#/~1parking-lots~1stats'
  /parking-lots/{id}:
    $ref: 'openapi/paths/parking-lot.yaml#/~1parking-lots~1{id}'
  /parking-lots/{id}/gates:
    $ref: 'openapi/paths/parking-lot.yaml#/~1parking-lots~1{id}~1gates'
  /gates/{id}:
    $ref: 'openapi/paths/parking-lot.yaml#/~1gates~1{id}'

  /billing-rules:
    get:
      tags: [BillingRule]
      summary: 获取计费规则
      description: 根据停车场ID获取计费规则。platform_admin 和 tenant_admin 有权访问。
      security:
        - BearerAuth: []
      parameters:
        - name: parking_lot_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: 停车场ID
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer, example: 0 }
                  message: { type: string, example: success }
                  data:
                    $ref: '#/components/schemas/BillingRule'
        '400':
          description: 缺少 parking_lot_id 参数
        '403':
          description: 无权访问
        '404':
          description: 计费规则不存在

  /billing-rules/{id}:
    put:
      tags: [BillingRule]
      summary: 更新计费规则
      description: 更新指定计费规则的字段。变更将记录审计日志。
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: 计费规则ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBillingRuleRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer, example: 0 }
                  message: { type: string, example: 计费规则已更新 }
                  data:
                    $ref: '#/components/schemas/BillingRule'
        '400':
          description: 参数校验失败
        '403':
          description: 无权修改
        '404':
          description: 计费规则不存在

  /billing-rules/calculate:
    post:
      tags: [BillingRule]
      summary: 费用模拟计算
      description: 根据停车场计费规则模拟计算停车费用，返回详细计费明细。
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalculateFeeRequest'
      responses:
        '200':
          description: 计算成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer, example: 0 }
                  message: { type: string, example: success }
                  data:
                    $ref: '#/components/schemas/CalculateFeeResponse'
        '400':
          description: 参数错误（时间格式无效或出场早于入场）
        '404':
          description: 停车场或计费规则不存在

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Token 认证

  parameters:
    TenantId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: 租户ID
    UserId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: 用户ID

  responses:
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: 'openapi/schemas/common.yaml#/ErrorResponse'
          example:
            code: INVALID_REQUEST
            message: 请求参数错误
    Unauthorized:
      description: 未授权
      content:
        application/json:
          schema:
            $ref: 'openapi/schemas/common.yaml#/ErrorResponse'
          example:
            code: UNAUTHORIZED
            message: 未授权访问
    Forbidden:
      description: 权限不足
      content:
        application/json:
          schema:
            $ref: 'openapi/schemas/common.yaml#/ErrorResponse'
          example:
            code: PERMISSION_DENIED
            message: 权限不足
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: 'openapi/schemas/common.yaml#/ErrorResponse'
          example:
            code: NOT_FOUND
            message: 资源不存在

  schemas:
    LoginRequest:
      $ref: 'openapi/schemas/auth.yaml#/LoginRequest'
    SendSmsCodeRequest:
      $ref: 'openapi/schemas/auth.yaml#/SendSmsCodeRequest'
    SmsLoginRequest:
      $ref: 'openapi/schemas/auth.yaml#/SmsLoginRequest'
    RefreshTokenRequest:
      $ref: 'openapi/schemas/auth.yaml#/RefreshTokenRequest'
    LoginResponse:
      $ref: 'openapi/schemas/auth.yaml#/LoginResponse'
    UserInfo:
      $ref: 'openapi/schemas/auth.yaml#/UserInfo'
    CurrentUserResponse:
      $ref: 'openapi/schemas/auth.yaml#/CurrentUserResponse'
    Tenant:
      $ref: 'openapi/schemas/tenant.yaml#/Tenant'
    TenantListResponse:
      $ref: 'openapi/schemas/tenant.yaml#/TenantListResponse'
    CreateTenantRequest:
      $ref: 'openapi/schemas/tenant.yaml#/CreateTenantRequest'
    UpdateTenantRequest:
      $ref: 'openapi/schemas/tenant.yaml#/UpdateTenantRequest'
    User:
      $ref: 'openapi/schemas/user.yaml#/User'
    UserListResponse:
      $ref: 'openapi/schemas/user.yaml#/UserListResponse'
    CreateUserRequest:
      $ref: 'openapi/schemas/user.yaml#/CreateUserRequest'
    UpdateUserRequest:
      $ref: 'openapi/schemas/user.yaml#/UpdateUserRequest'
    ParkingLot:
      $ref: 'openapi/schemas/parking-lot.yaml#/ParkingLot'
    ParkingLotListResponse:
      $ref: 'openapi/schemas/parking-lot.yaml#/ParkingLotListResponse'
    ParkingLotStatsResponse:
      $ref: 'openapi/schemas/parking-lot.yaml#/ParkingLotStatsResponse'
    CreateParkingLotRequest:
      $ref: 'openapi/schemas/parking-lot.yaml#/CreateParkingLotRequest'
    UpdateParkingLotRequest:
      $ref: 'openapi/schemas/parking-lot.yaml#/UpdateParkingLotRequest'
    Gate:
      $ref: 'openapi/schemas/parking-lot.yaml#/Gate'
    GateWithDevice:
      $ref: 'openapi/schemas/parking-lot.yaml#/GateWithDevice'
    DeviceInfo:
      $ref: 'openapi/schemas/parking-lot.yaml#/DeviceInfo'
    CreateGateRequest:
      $ref: 'openapi/schemas/parking-lot.yaml#/CreateGateRequest'
    UpdateGateRequest:
      $ref: 'openapi/schemas/parking-lot.yaml#/UpdateGateRequest'
    ErrorResponse:
      $ref: 'openapi/schemas/common.yaml#/ErrorResponse'
    MessageResponse:
      $ref: 'openapi/schemas/common.yaml#/MessageResponse'
    BillingRule:
      type: object
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        parking_lot_id: { type: string, format: uuid }
        free_minutes: { type: integer, minimum: 0, maximum: 120, example: 15 }
        price_per_hour: { type: number, format: decimal, minimum: 1, maximum: 50, example: 2.00 }
        daily_cap: { type: number, format: decimal, minimum: 0, maximum: 500, example: 20.00, description: "0表示不封顶" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    UpdateBillingRuleRequest:
      type: object
      required: [price_per_hour]
      properties:
        free_minutes: { type: integer, minimum: 0, maximum: 120, example: 15 }
        price_per_hour: { type: number, minimum: 1, maximum: 50, example: 2.00 }
        daily_cap: { type: number, minimum: 0, maximum: 500, example: 20.00 }
    CalculateFeeRequest:
      type: object
      required: [parking_lot_id, entry_time, exit_time]
      properties:
        parking_lot_id: { type: string, format: uuid }
        entry_time: { type: string, format: date-time, example: "2024-01-01T08:00:00Z" }
        exit_time: { type: string, format: date-time, example: "2024-01-01T10:30:00Z" }
    CalculateFeeResponse:
      type: object
      properties:
        parking_duration: { type: integer, description: "停车时长（分钟）" }
        free_minutes: { type: integer, description: "免费时长（分钟）" }
        billable_minutes: { type: integer, description: "计费时长（分钟）" }
        billable_hours: { type: integer, description: "计费小时数（向上取整）" }
        price_per_hour: { type: number, description: "单价（元/小时）" }
        daily_cap: { type: number, description: "每日封顶（元）" }
        days: { type: integer, description: "停车天数" }
        raw_fee: { type: number, description: "原始费用" }
        final_fee: { type: number, description: "最终费用" }

x-error-codes:
  - code: INVALID_REQUEST
    status: 400
    description: 请求参数错误
  - code: INVALID_CREDENTIALS
    status: 401
    description: 账号或密码错误
  - code: ACCOUNT_FROZEN
    status: 403
    description: 账号已被冻结
  - code: TENANT_FROZEN
    status: 403
    description: 租户已暂停服务
  - code: INVALID_SMS_CODE
    status: 400
    description: 验证码错误或已过期
  - code: SMS_TOO_FREQUENT
    status: 429
    description: 验证码发送过于频繁
  - code: PHONE_NOT_REGISTERED
    status: 400
    description: 该手机号未注册
  - code: TOKEN_EXPIRED
    status: 401
    description: Token已过期
  - code: TOKEN_INVALID
    status: 401
    description: 无效的Token
  - code: PERMISSION_DENIED
    status: 403
    description: 权限不足
  - code: UNAUTHORIZED
    status: 401
    description: 未授权访问
  - code: NOT_FOUND
    status: 404
    description: 资源不存在
  - code: USERNAME_EXISTS
    status: 400
    description: 用户名已存在
  - code: PHONE_EXISTS
    status: 400
    description: 手机号已被使用
  - code: PARKING_LOT_NOT_FOUND
    status: 404
    numeric_code: 40401
    description: 停车场不存在
  - code: PARKING_LOT_NAME_EXISTS
    status: 409
    numeric_code: 40901
    description: 该车场名称已存在
  - code: PARKING_LOT_FORBIDDEN
    status: 403
    numeric_code: 40301
    description: 无权操作该停车场
  - code: PARKING_LOT_HAS_VEHICLES
    status: 403
    numeric_code: 40302
    description: 该车场存在在场车辆，无法操作
  - code: PARKING_LOT_INVALID_SPACES
    status: 400
    numeric_code: 40002
    description: 车位数需要大于0
  - code: PARKING_LOT_SPACES_LESS_THAN_OCCUPIED
    status: 400
    numeric_code: 40003
    description: 车位数不能少于当前在场车辆数
  - code: GATE_NOT_FOUND
    status: 404
    numeric_code: 40402
    description: 出入口不存在
  - code: GATE_NAME_EXISTS
    status: 409
    numeric_code: 40902
    description: 该出入口名称已存在
  - code: LAST_ENTRY_GATE
    status: 403
    numeric_code: 40303
    description: 每个车场至少保留一个入口
  - code: LAST_EXIT_GATE
    status: 403
    numeric_code: 40304
    description: 每个车场至少保留一个出口
  - code: GATE_HAS_UNFINISHED_RECORDS
    status: 403
    numeric_code: 40305
    description: 该出入口存在未完成的通行记录，无法删除
  - code: BILLING_RULE_NOT_FOUND
    status: 404
    numeric_code: 40402
    description: 计费规则不存在
  - code: INVALID_FREE_MINUTES
    status: 400
    numeric_code: 40003
    description: 免费时长必须在0-120分钟之间
  - code: INVALID_PRICE_PER_HOUR
    status: 400
    numeric_code: 40003
    description: 计费单价必须在1-50元之间
  - code: INVALID_DAILY_CAP
    status: 400
    numeric_code: 40003
    description: 每日封顶必须在0-500元之间
  - code: INVALID_TIME_RANGE
    status: 400
    numeric_code: 40003
    description: 出场时间必须晚于入场时间
