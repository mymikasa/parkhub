syntax = "proto3";

package parkhub.core.v1;

import "google/protobuf/timestamp.proto";
import "api/proto/common/v1/enums.proto";
import "api/proto/common/v1/pagination.proto";

option go_package = "github.com/parkhub/api/internal/gen/proto/core/v1;corev1";

// User 用户实体
message User {
  string user_id = 1;
  string tenant_id = 2;
  string username = 3;
  string email = 4;
  string phone = 5;
  string real_name = 6;
  common.v1.UserRole role = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

service UserService {
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
  rpc AssignRole(AssignRoleRequest) returns (AssignRoleResponse);
  rpc ResetPassword(ResetPasswordRequest) returns (ResetPasswordResponse);
}

message GetUserRequest {
  string user_id = 1;
}

message GetUserResponse {
  User user = 1;
}

message ListUsersRequest {
  string tenant_id = 1;
  common.v1.UserRole role_filter = 2;
  common.v1.PaginationRequest pagination = 3;
}

message ListUsersResponse {
  repeated User users = 1;
  common.v1.PaginationResponse pagination = 2;
}

message CreateUserRequest {
  string tenant_id = 1;
  string username = 2;
  string email = 3;
  string phone = 4;
  string real_name = 5;
  common.v1.UserRole role = 6;
}

message CreateUserResponse {
  User user = 1;
}

message UpdateUserRequest {
  string user_id = 1;
  string email = 2;
  string phone = 3;
  string real_name = 4;
}

message UpdateUserResponse {
  User user = 1;
}

message DeleteUserRequest {
  string user_id = 1;
}

message DeleteUserResponse {}

message AssignRoleRequest {
  string user_id = 1;
  common.v1.UserRole role = 2;
}

message AssignRoleResponse {}

message ResetPasswordRequest {
  string user_id = 1;
  string new_password = 2;
}

message ResetPasswordResponse {}
