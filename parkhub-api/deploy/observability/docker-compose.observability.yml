services:
  otelcol:
    image: otel/opentelemetry-collector-contrib:0.102.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otelcol/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC（供 monolith SDK 上报）
      - "4318:4318"   # OTLP HTTP（可选）
      - "8888:8888"   # Collector 自身 metrics
    depends_on:
      victoriametrics:
        condition: service_started
      tempo:
        condition: service_started
      loki:
        condition: service_started
    networks:
      - obs

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.101.0
    command:
      - "-storageDataPath=/data"
      - "-retentionPeriod=7d"
    ports:
      - "8428:8428"
    volumes:
      - vm-data:/data
    networks:
      - obs

  tempo:
    image: grafana/tempo:2.5.0
    user: "0:0"
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/tmp/tempo
    ports:
      - "3200:3200"   # HTTP API（Grafana 查询）
    networks:
      - obs

  loki:
    image: grafana/loki:3.0.0
    user: "0:0"
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./loki/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/tmp/loki
    ports:
      - "3100:3100"
    networks:
      - obs

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_FEATURE_TOGGLES_ENABLE: "traceqlEditor"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - victoriametrics
      - tempo
      - loki
    networks:
      - obs

volumes:
  vm-data:
  tempo-data:
  loki-data:
  grafana-data:

networks:
  obs:
    driver: bridge
