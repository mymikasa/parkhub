root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/main ./cmd/server"
bin = "./tmp/main"
full_bin = "./tmp/main"
include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml"]
exclude_dir = ["assets", "tmp", "vendor", "node_modules"]
exclude_regex = ["_test.go"]
exclude_unchanged = true
delay = 1000
stop_on_error = true
send_interrupt = true
kill_delay = 2000
log = "build-errors.log"

[log]
time = true
color = true
main_only = false

[misc]
clean_on_exit = true
